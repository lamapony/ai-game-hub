name: Deploy Cloudflare

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy Worker
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CLEANUP_SECRET: ${{ secrets.CLEANUP_SECRET }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL }}
      OPENAI_VISION_MODEL: ${{ vars.OPENAI_VISION_MODEL }}
      OPENAI_TTS_MODEL: ${{ vars.OPENAI_TTS_MODEL }}
      OPENAI_TRANSCRIBE_MODEL: ${{ vars.OPENAI_TRANSCRIBE_MODEL }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Validate deploy secrets
        run: |
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$CLEANUP_SECRET"
          test -n "$OPENAI_API_KEY"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Prepare runtime secrets
        run: |
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY"
            echo "VITE_SUPABASE_PROJECT_ID=$VITE_SUPABASE_PROJECT_ID"
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            echo "CLEANUP_SECRET=$CLEANUP_SECRET"
            echo "OPENAI_API_KEY=$OPENAI_API_KEY"
            echo "OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}"
            echo "OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}"
            echo "OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o-mini}"
            echo "OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}"
            echo "OPENAI_TRANSCRIBE_MODEL=${OPENAI_TRANSCRIBE_MODEL:-gpt-4o-mini-transcribe}"
          } > dist/server/.deploy.env

      - name: Deploy
        run: npx wrangler deploy --config wrangler.json --cwd dist/server --secrets-file .deploy.env --keep-vars
